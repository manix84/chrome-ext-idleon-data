<html lang="en">
  <head>
    <title>Idleon API Downloader</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>

  <body>
    <header>Idleon API Downloader</header>

    <div id="loader">
      <img src="assets/puff.svg" alt="" />
      <div class="loader-text">Waiting for Legends Of Idleon data...</div>
    </div>

    <div id="status" aria-live="polite"></div>

    <div class="actions">
      <button id="clearDataBtn" type="button">Clear Cached Data</button>
    </div>

    <div id="content">
      <div class="json">
        <span>Raw JSON</span>
        <button id="rawCopyLink" class="icon-button" type="button" aria-label="Copy raw JSON" title="Copy raw JSON">
          <img src="assets/copy.svg" alt="copy" />
        </button>
        <a id="rawDownloadLink" aria-label="Download raw JSON" title="Download raw JSON">
          <img src="assets/download.svg" alt="download" />
        </a>
      </div>

      <div class="json">
        <span>Clean JSON</span>
        <button id="cleanJsonCopyLink" class="icon-button" type="button" aria-label="Copy clean JSON" title="Copy clean JSON">
          <img class="copy" src="assets/copy.svg" alt="copy" />
        </button>
        <a id="cleanJsonDownloadLink" aria-label="Download clean JSON" title="Download clean JSON">
          <img class="download" src="assets/download.svg" alt="download" />
        </a>
      </div>

      <div class="json">
        <span>Looty String</span>
        <button id="lootyCopyLink" class="icon-button" type="button" aria-label="Copy Looty string" title="Copy Looty string">
          <img class="copy" src="assets/copy.svg" alt="copy" />
        </button>
      </div>

      <div class="json">
        <span>Quests String</span>
        <button id="questsCopyLink" class="icon-button" type="button" aria-label="Copy quests string" title="Copy quests string">
          <img class="copy" src="assets/copy.svg" alt="copy" />
        </button>
      </div>

      <div class="sub-header">Idleon Calculator Import Columns</div>

      <div class="json">
        <span>Family</span>
        <button id="familyCopyLink" class="icon-button" type="button" aria-label="Copy family import column" title="Copy family import column">
          <img class="copy" src="assets/copy.svg" alt="copy" />
        </button>
      </div>

      <div class="json">
        <span>Guild</span>
        <button id="guildCopyLink" class="icon-button" type="button" aria-label="Copy guild import column" title="Copy guild import column">
          <img class="copy" src="assets/copy.svg" alt="copy" />
        </button>
      </div>

      <div class="sub-header">Characters</div>
      <ul class="characters">
        <li>
          <span class="character-index">#1</span>
          <button id="char0CopyLink" class="icon-button" type="button" aria-label="Copy character 1 import column" title="Copy character 1 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#2</span>
          <button id="char1CopyLink" class="icon-button" type="button" aria-label="Copy character 2 import column" title="Copy character 2 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#3</span>
          <button id="char2CopyLink" class="icon-button" type="button" aria-label="Copy character 3 import column" title="Copy character 3 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#4</span>
          <button id="char3CopyLink" class="icon-button" type="button" aria-label="Copy character 4 import column" title="Copy character 4 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#5</span>
          <button id="char4CopyLink" class="icon-button" type="button" aria-label="Copy character 5 import column" title="Copy character 5 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#6</span>
          <button id="char5CopyLink" class="icon-button" type="button" aria-label="Copy character 6 import column" title="Copy character 6 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#7</span>
          <button id="char6CopyLink" class="icon-button" type="button" aria-label="Copy character 7 import column" title="Copy character 7 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#8</span>
          <button id="char7CopyLink" class="icon-button" type="button" aria-label="Copy character 8 import column" title="Copy character 8 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
        <li>
          <span class="character-index">#9</span>
          <button id="char8CopyLink" class="icon-button" type="button" aria-label="Copy character 9 import column" title="Copy character 9 import column">
            <img class="copy" src="assets/copy.svg" alt="copy" />
          </button>
        </li>
      </ul>

      <div class="json">
        <span>Companion (Coming Soon)</span>
      </div>

      <div class="json">
        <span>Guild CSV</span>
        <button id="guildExportCsvCopyLink" class="icon-button" type="button" aria-label="Copy guild CSV" title="Copy guild CSV">
          <img class="copy" src="assets/copy.svg" alt="copy" />
        </button>
      </div>
    </div>

    <input type="text" id="copy-from" hidden />
    <div id="tooltip">Copied!</div>

    <script src="js/popup.js" type="text/javascript"></script>
  </body>
</html>
